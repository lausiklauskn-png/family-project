<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="goldRingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF6C8"/>
      <stop offset="15%"  stop-color="#FFE066"/>
      <stop offset="40%"  stop-color="#F4C430"/>
      <stop offset="70%"  stop-color="#A67C00"/>
      <stop offset="100%" stop-color="#5B3D00"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF1A8"/>
      <stop offset="35%"  stop-color="#FFD700"/>
      <stop offset="55%"  stop-color="#E5B312"/>
      <stop offset="85%"  stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5B3D00"/>
    </linearGradient>
    <linearGradient id="goldRibbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE873"/>
      <stop offset="50%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#7A5800"/>
    </linearGradient>
    <linearGradient id="goldShieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#A67C00"/>
    </linearGradient>
    <radialGradient id="navyDeep" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#1A2C5C"/>
      <stop offset="60%"  stop-color="#0E1A40"/>
      <stop offset="100%" stop-color="#050A1F"/>
    </radialGradient>
    <radialGradient id="gemGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#9BC4FF"/>
      <stop offset="35%"  stop-color="#3A6FE8"/>
      <stop offset="100%" stop-color="#0B1F70"/>
    </radialGradient>
    <radialGradient id="treeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFF1A8" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#F4C430" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <filter id="darkDropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="3" dy="5" result="shadow"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.0"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="embossShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.65"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.8"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Korona-Blur (Akkretions-Disk-Stil aus Sage-Page .bh-disk).
         stdDeviation=22 entspricht in etwa dem `filter: blur(10px)` der
         CSS-Variante bei 280-px-Skalierung; im 1024-Viewbox stärker
         dosiert, damit die zwölf farbigen Arc-Segmente zu einem
         weichen Conic-Gradient verschmelzen. -->
    <filter id="bhCorona" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>
    <filter id="bhCoronaInner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <path id="topArc" d="M 141.1 412.6 A 384 384 0 0 1 882.9 412.6" fill="none"/>
  </defs>

  <rect width="1024" height="1024" fill="#050505"/>

  <!-- Akkretions-Disk-Korona (Vorbild: .bh-disk auf Sage-Page).
       Conic-Gradient orange → gold → magenta → blau → türkis → orange
       als zwölf Arc-Segmente (je 30°) um den Siegel-Außenrand
       (Radius 475, knapp außerhalb des Gold-Rings r=444), mit
       feGaussianBlur stdDeviation=22 → smoothe Conic-Anmutung.
       Innerer Ring (Radius 460, schmaler Stroke, weniger Blur)
       entspricht .bh-disk-2 — dezente zweite Schicht. -->
  <g filter="url(#bhCorona)" opacity="0.78">
